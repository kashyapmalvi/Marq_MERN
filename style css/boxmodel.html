<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box Model Presentation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div class="header-box">
            <h1>Box Model</h1>
        </div>

        <div class="info-box">
            <p>Every element on the page has its own box, which can be styled using CSS.</p>
        </div>

        <div class="info-box">
            <p>From the inside out:</p>
        </div>

        <ul class="list-container">
            <li><span class="highlight">content</span></li>
            <li><span class="highlight">padding</span></li>
            <li><span class="highlight">border</span></li>
            <li><span class="highlight">margin</span></li>
        </ul>

        <h2 class="sub-heading">Background</h2>

        <div class="info-box">
            <p>Keep in mind that a <span class="bordered-word">background</span> will cover the content and the padding.</p>
        </div>
    </div>

</body>
</html>
