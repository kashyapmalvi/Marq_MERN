<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flipkart Clone - Header</title>
    <link rel="stylesheet" href="style.css">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <header class="flipkart-header">
        <!-- Top Row: Sub-brands and Location -->
        <div class="top-row">
            <div class="sub-brands">
                <div class="brand-badge logo-main">
                    <i class="fa-solid fa-bolt-lightning text-blue"></i> <span>Flipkart</span>
                </div>
                <div class="brand-badge gray-badge">
                    <i class="fa-solid fa-motorcycle text-red"></i> <span>Minutes</span>
                </div>
                <div class="brand-badge gray-badge">
                    <i class="fa-solid fa-plane text-orange"></i> <span>Travel</span>
                </div>
                <div class="brand-badge gray-badge">
                    <i class="fa-solid fa-basket-shopping text-green"></i> <span>Grocery</span>
                </div>
            </div>
            
            <div class="top-right-info">
                <div class="location-picker">
                    <i class="fa-solid fa-location-dot"></i>
                    <span class="pincode">560066</span>
                    <span class="delivery-text">Select delivery location</span>
                    <i class="fa-solid fa-chevron-right chevron"></i>
                </div>
                <div class="supercoin-badge">
                    <i class="fa-solid fa-bolt text-yellow"></i> <span>0</span>
                </div>
            </div>
        </div>

        <!-- Middle Row: Search and Profile Navigation -->
        <div class="middle-row">
            <div class="search-container">
                <i class="fa-solid fa-magnifying-glass search-icon"></i>
                <input type="text" placeholder="Search for Products, Brands and More">
            </div>
            
            <div class="nav-actions">
                <div class="nav-item user-profile">
                    <i class="fa-regular fa-circle-user"></i>
                    <span>Kashyap</span>
                    <i class="fa-solid fa-chevron-down chevron"></i>
                </div>
                <div class="nav-item more-dropdown">
                    <span>More</span>
                    <i class="fa-solid fa-chevron-down chevron"></i>
                </div>
                <div class="nav-item cart-btn">
                    <i class="fa-solid fa-cart-shopping"></i>
                    <span>Cart</span>
                </div>
            </div>
        </div>

        <!-- Bottom Row: Categories Navbar -->
        <nav class="categories-nav">
            <div class="category-item active">
                <div class="category-icon-wrapper active-bg">
                    <i class="fa-solid fa-bag-shopping yellow-icon"></i>
                </div>
                <span>For You</span>
            </div>
            <div class="category-item">
                <div class="category-icon-wrapper">
                    <i class="fa-solid fa-shirt yellow-icon"></i>
                </div>
                <span>Fashion</span>
            </div>
            <div class="category-item">
                <div class="category-icon-wrapper">
                    <i class="fa-solid fa-mobile-screen-button yellow-icon"></i>
                </div>
                <span>Mobiles</span>
            </div>
            <div class="category-item">
                <div class="category-icon-wrapper">
                    <i class="fa-solid fa-lipstick yellow-icon"></i>
                </div>
                <span>Beauty</span>
            </div>
            <div class="category-item">
                <div class="category-icon-wrapper">
                    <i class="fa-solid fa-laptop yellow-icon"></i>
                </div>
                <span>Electronics</span>
            </div>
            <div class="category-item">
                <div class="category-icon-wrapper">
                    <i class="fa-solid fa-lamp yellow-icon"></i>
                </div>
                <span>Home</span>
            </div>
            <div class="category-item">
                <div class="category-icon-wrapper">
                    <i class="fa-solid fa-tv yellow-icon"></i>
                </div>
                <span>Appliances</span>
            </div>
            <div class="category-item">
                <div class="category-icon-wrapper">
                    <i class="fa-solid fa-teddy-bear yellow-icon"></i>
                </div>
                <span>Toys, ba...</span>
            </div>
            <div class="category-item">
                <div class="category-icon-wrapper">
                    <i class="fa-solid fa-jar yellow-icon"></i>
                </div>
                <span>Food & H...</span>
            </div>
            <div class="category-item">
                <div class="category-icon-wrapper">
                    <i class="fa-solid fa-helmet-safety yellow-icon"></i>
                </div>
                <span>Auto Acc...</span>
            </div>
            <div class="category-item">
                <div class="category-icon-wrapper">
                    <i class="fa-solid fa-moped yellow-icon"></i>
                </div>
                <span>2 Wheele...</span>
            </div>
            <div class="category-item">
                <div class="category-icon-wrapper">
                    <i class="fa-solid fa-baseball-bat-ball yellow-icon"></i>
                </div>
                <span>Sports & ...</span>
            </div>
            <div class="category-item">
                <div class="category-icon-wrapper">
                    <i class="fa-solid fa-book yellow-icon"></i>
                </div>
                <span>Books & ...</span>
            </div>
            <div class="category-item">
                <div class="category-icon-wrapper">
                    <i class="fa-solid fa-couch yellow-icon"></i>
                </div>
                <span>Furniture</span>
            </div>
        </nav>
    </header>

</body>
</html>
