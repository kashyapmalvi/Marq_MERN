<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minimal Form</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f5f5f5;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.form-container{
    width:350px;
    background:#fff;
    padding:30px;
    border-radius:12px;
    box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

h2{
    text-align:center;
    margin-bottom:25px;
    color:#222;
    font-weight:600;
}

.input-group{
    margin-bottom:18px;
}

label{
    display:block;
    margin-bottom:6px;
    color:#555;
    font-size:14px;
}

input,
textarea{
    width:100%;
    padding:12px;
    border:1px solid #ddd;
    border-radius:8px;
    outline:none;
    font-size:15px;
    transition:.3s;
}

input:focus,
textarea:focus{
    border-color:#000;
}

textarea{
    resize:none;
    height:100px;
}

button{
    width:100%;
    padding:12px;
    background:#111;
    color:#fff;
    border:none;
    border-radius:8px;
    font-size:15px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#333;
}
</style>
</head>

<body>

<div class="form-container">
    <h2>Contact Us</h2>

    <form>
        <div class="input-group">
            <label>Name</label>
            <input type="text" placeholder="Enter your name">
        </div>

        <div class="input-group">
            <label>Email</label>
            <input type="email" placeholder="Enter your email">
        </div>

        <div class="input-group">
            <label>Message</label>
            <textarea placeholder="Write your message"></textarea>
        </div>

        <button type="submit">Submit</button>
    </form>
</div>

</body>
</html>
