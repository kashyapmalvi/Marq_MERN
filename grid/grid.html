      .grid-items {
  border-radius:5px;

  /* align-items: center;

}



.grid-items:nth-child(odd){

}

#grid-container {
  border: 1px solid rgb(8, 8, 8);
  width: 400px;
  height: 400px;
  border-radius: 10px;
  margin: 1rem;
  display: grid;
  padding: 1rem;
  grid-template-columns: repeat(7, 1fr);
  grid-template-rows: repeat(7, 1fr);
  align-items: center;
  justify-items: center;
}
